#The title of this activity
title: Set strategic KPIs

#Describe the benefit that is achieved by implementing this activity
benefit: Objective basis for steering and communicating the application security program

#A one sentence description of the activity
shortDescription: Define KPIs that express program goals and make performance visible to leadership and teams.

#A multi-paragraph description of the activity
longDescription: |
  Once the organization has a working set of metrics and some experience reading them, promote a subset to Key Performance Indicators (KPIs). KPIs are the handful of measurements the organization treats as load-bearing for strategic decisions about the application security program. Not every metric is a KPI and the act of promotion should be deliberate.

  Metrics at level 1 give a sense of what is happening; KPIs at level 2 express what the organization wants to happen and set an expectation for where the numbers should be. This is the beginning of goal-driven measurement, though the full rigor of deriving metrics from goals and evaluating their validity is still a level 3 concern.

  Before committing to a KPI, gather enough data from the underlying metric to establish a realistic target. Develop KPIs with the buy-in from both the leadership responsible for the program and the teams whose work the KPI reflects.

  Each KPI should have a declared audience and address a specific program concern or goal. Document it with:

  * Acceptability thresholds that indicate when a value is healthy, concerning, or requires action
  * Guidance on what action to take when a threshold is crossed
  * A brief explanation of what movement in the KPI means

