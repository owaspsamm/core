#The title of this activity
title: Define basic security metrics

#Describe the benefit that is achieved by implementing this activity
benefit: Basic insights into your AppSec program's effectiveness and efficiency

#A one sentence description of the activity
shortDescription: Define metrics with insight into the effectiveness and efficiency
  of the Application Security Program.

#A multi-paragraph description of the activity
longDescription: |
  Define and document metrics to evaluate the effectiveness and efficiency of the application security program. At this level, measurement is about gaining visibility. For instance, using metrics for noticing trends, spotting anomalies, and giving leadership and teams a shared basis for conversation about the state of the program. Measurable improvements can also be used to secure future support and funding for the program.

  Metrics at this level should cover concerns that span the whole program rather than being tied to a single application or tool. Useful examples include:

  * Exposure of secrets across repositories and developer machines
  * Open vulnerabilities and their follow-up across products
  * Dependency hygiene, such as the proportion of outdated or vulnerable dependencies
  * Coverage of security activities such as code reviews, scans, and threat modeling
  * Remediation times for security issues

  While identifying metrics, it's always recommended to stick to the metrics that meet several criteria

  * Consistently Measured
  * Inexpensive to gather
  * Expressed as a cardinal number or a percentage
  * Expressed as a unit of measure

  Document each metric with its source, what it covers, known limitations, and guidance on how to interpret movement. Publish metrics to the application security and development teams so they can reason about the program together.

